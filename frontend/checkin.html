<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Check-in — Start The Up</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Instrument+Serif:ital@0;1&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet" />
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    :root { --cream: #FAF9F6; }
    body { font-family: 'DM Sans', sans-serif; background: var(--cream); }
    .serif { font-family: 'Instrument Serif', serif; }
    .fade-in { animation: fadeIn 0.4s ease; }
    @keyframes fadeIn { from { opacity:0; transform:translateY(10px); } to { opacity:1; transform:translateY(0); } }
    input, textarea { transition: border-color 0.15s, box-shadow 0.15s; }
    input:focus, textarea:focus { outline: none; border-color: #1A1A1A !important; box-shadow: 0 0 0 3px rgba(26,26,26,0.06); }
    .btn-dark { background: #1A1A1A; color: white; transition: background 0.2s, transform 0.1s; }
    .btn-dark:hover { background: #333; transform: translateY(-1px); }
    .btn-dark:disabled { background: #9CA3AF; transform: none; cursor: not-allowed; }
    .slider-track { -webkit-appearance: none; appearance: none; height: 6px; background: #E5E3DC; border-radius: 99px; outline: none; cursor: pointer; }
    .slider-track::-webkit-slider-thumb { -webkit-appearance: none; appearance: none; width: 20px; height: 20px; border-radius: 50%; background: #1A1A1A; cursor: pointer; border: 2px solid white; box-shadow: 0 1px 4px rgba(0,0,0,0.2); }
    .history-item:not(:last-child) { border-bottom: 1px solid #F0EDE6; }
    .nav-link { transition: color 0.15s; }
    .nav-link:hover { color: #111; }
  </style>
</head>
<body class="min-h-screen">

  <!-- Nav -->
  <nav class="bg-white border-b border-gray-100 sticky top-0 z-50">
    <div class="max-w-6xl mx-auto px-6 py-4 flex items-center justify-between">
      <div class="flex items-center gap-3">
        <div class="w-8 h-8 rounded-xl bg-gray-900 flex items-center justify-center">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
            <polygon points="13 2 3 14 12 14 11 22 21 10 12 10 13 2"/>
          </svg>
        </div>
        <span class="serif text-lg text-gray-900">Start The Up</span>
      </div>
      <div class="flex items-center gap-6">
        <a href="dashboard.html" class="nav-link text-sm text-gray-500">Dashboard</a>
        <a href="checkin.html" class="nav-link text-sm font-medium text-gray-900">Check-in</a>
        <a href="launch-wall.html" class="nav-link text-sm text-gray-500">Launch Wall</a>
        <button onclick="logout()" class="text-sm text-gray-400 hover:text-gray-700 transition-colors">Sign out</button>
      </div>
    </div>
  </nav>

  <main class="max-w-2xl mx-auto px-6 py-10 fade-in">

    <div class="mb-8">
      <h1 class="serif text-4xl text-gray-900 mb-2">Submit Check-in</h1>
      <p class="text-gray-500 text-sm">Takes under 60 seconds · twice a week keeps you on track</p>
    </div>

    <!-- Success state -->
    <div id="successState" class="hidden bg-white rounded-3xl border border-gray-100 p-10 text-center">
      <div class="w-14 h-14 rounded-2xl bg-green-50 flex items-center justify-center mx-auto mb-4">
        <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="#22c55e" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="20 6 9 17 4 12"/></svg>
      </div>
      <h2 class="serif text-2xl text-gray-900 mb-2">Check-in submitted!</h2>
      <p class="text-gray-500 text-sm mb-6">Your progress has been recorded. Keep building! 🚀</p>
      <div class="flex gap-3 justify-center">
        <a href="dashboard.html" class="btn-dark px-6 py-2.5 rounded-xl text-sm font-medium">Back to Dashboard</a>
        <button onclick="resetForm()" class="px-6 py-2.5 rounded-xl text-sm font-medium border border-gray-200 hover:bg-gray-50 transition-colors">Submit another</button>
      </div>
    </div>

    <!-- Form -->
    <div id="formState" class="bg-white rounded-3xl border border-gray-100 p-8 space-y-6">

      <div id="errorMsg" class="hidden text-sm text-red-600 bg-red-50 border border-red-100 rounded-xl px-4 py-3"></div>

      <!-- What did you build -->
      <div>
        <label class="block text-xs font-medium text-gray-500 uppercase tracking-widest mb-2">What did you build since your last check-in? *</label>
        <textarea
          id="updateText"
          rows="4"
          placeholder="e.g. Built the popup UI, added the content script, fixed the permissions issue..."
          class="w-full px-4 py-3 rounded-xl border border-gray-200 bg-gray-50 text-gray-900 text-sm resize-none"
        ></textarea>
      </div>

      <!-- Demo link -->
      <div>
        <label class="block text-xs font-medium text-gray-500 uppercase tracking-widest mb-2">Demo / GitHub Link</label>
        <input
          id="demoLink"
          type="url"
          placeholder="https://github.com/you/your-extension"
          class="w-full px-4 py-3 rounded-xl border border-gray-200 bg-gray-50 text-gray-900 text-sm"
        />
      </div>

      <!-- Progress slider -->
      <div>
        <div class="flex items-center justify-between mb-3">
          <label class="text-xs font-medium text-gray-500 uppercase tracking-widest">Progress</label>
          <span id="sliderValue" class="text-2xl font-semibold text-gray-900">50%</span>
        </div>
        <input
          type="range"
          id="progressSlider"
          min="0" max="100" value="50" step="5"
          class="slider-track w-full"
          oninput="document.getElementById('sliderValue').textContent = this.value + '%'"
        />
        <div class="flex justify-between text-xs text-gray-400 mt-1">
          <span>Just started</span>
          <span>Halfway</span>
          <span>Launched 🎉</span>
        </div>
      </div>

      <!-- Blocker -->
      <div>
        <label class="block text-xs font-medium text-gray-500 uppercase tracking-widest mb-2">Blocker <span class="normal-case font-normal text-gray-400">(optional)</span></label>
        <textarea
          id="blocker"
          rows="2"
          placeholder="Stuck on something? Share it — the community can help."
          class="w-full px-4 py-3 rounded-xl border border-gray-200 bg-gray-50 text-gray-900 text-sm resize-none"
        ></textarea>
      </div>

      <button id="submitBtn" onclick="submitCheckin()" class="btn-dark w-full py-3.5 rounded-xl font-medium text-sm">
        Submit Check-in →
      </button>
    </div>

    <!-- History -->
    <div class="mt-8">
      <h3 class="font-semibold text-gray-900 mb-4">Your History</h3>
      <div id="historyList" class="bg-white rounded-2xl border border-gray-100 divide-y divide-gray-50 overflow-hidden">
        <div class="px-6 py-4 text-sm text-gray-400">Loading…</div>
      </div>
    </div>

  </main>

  <script src="static/script.js"></script>
  <script>
    requireAuth();
    loadHistory();

    async function submitCheckin() {
      const updateText = document.getElementById('updateText').value.trim();
      const demoLink = document.getElementById('demoLink').value.trim();
      const progress = parseInt(document.getElementById('progressSlider').value);
      const blocker = document.getElementById('blocker').value.trim();
      const btn = document.getElementById('submitBtn');
      const errEl = document.getElementById('errorMsg');

      if (!updateText) {
        errEl.textContent = 'Please describe what you built.';
        errEl.classList.remove('hidden');
        return;
      }
      errEl.classList.add('hidden');

      btn.textContent = 'Submitting…';
      btn.disabled = true;

      try {
        await apiFetch('/checkin', {
          method: 'POST',
          body: JSON.stringify({ update_text: updateText, demo_link: demoLink || null, progress, blocker: blocker || null }),
        });
        document.getElementById('formState').classList.add('hidden');
        document.getElementById('successState').classList.remove('hidden');
        loadHistory();
      } catch (err) {
        errEl.textContent = err.message;
        errEl.classList.remove('hidden');
        btn.textContent = 'Submit Check-in →';
        btn.disabled = false;
      }
    }

    function resetForm() {
      document.getElementById('formState').classList.remove('hidden');
      document.getElementById('successState').classList.add('hidden');
      document.getElementById('updateText').value = '';
      document.getElementById('demoLink').value = '';
      document.getElementById('progressSlider').value = 50;
      document.getElementById('sliderValue').textContent = '50%';
      document.getElementById('blocker').value = '';
      document.getElementById('submitBtn').textContent = 'Submit Check-in →';
      document.getElementById('submitBtn').disabled = false;
    }

    async function loadHistory() {
      const checkins = await apiFetch('/checkins/me');
      const el = document.getElementById('historyList');
      if (!checkins.length) {
        el.innerHTML = '<div class="px-6 py-4 text-sm text-gray-400">No check-ins yet. Submit your first one!</div>';
        return;
      }
      el.innerHTML = checkins.slice(0, 5).map(c => {
        const d = new Date(c.created_at).toLocaleDateString('en-GB', { day:'numeric', month:'short', year:'numeric' });
        return `<div class="history-item px-6 py-4">
          <div class="flex items-start justify-between gap-4">
            <div class="flex-1">
              <p class="text-sm text-gray-800">${c.update_text}</p>
              ${c.blocker ? `<p class="text-xs text-orange-500 mt-1">⚠ ${c.blocker}</p>` : ''}
              ${c.demo_link ? `<a href="${c.demo_link}" target="_blank" class="text-xs text-blue-500 hover:underline mt-1 inline-block">View demo →</a>` : ''}
            </div>
            <div class="text-right flex-shrink-0">
              <span class="text-lg font-semibold text-gray-900">${c.progress}%</span>
              <p class="text-xs text-gray-400 mt-0.5">${d}</p>
            </div>
          </div>
        </div>`;
      }).join('');
    }
  </script>
</body>
</html>
