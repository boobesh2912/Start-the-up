<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Launch Wall — Start The Up</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Instrument+Serif:ital@0;1&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet" />
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    :root { --cream: #FAF9F6; }
    body { font-family: 'DM Sans', sans-serif; background: var(--cream); }
    .serif { font-family: 'Instrument Serif', serif; }
    .fade-in { animation: fadeIn 0.4s ease; }
    @keyframes fadeIn { from { opacity:0; transform:translateY(10px); } to { opacity:1; transform:translateY(0); } }
    .launch-card {
      background: white;
      border-radius: 20px;
      border: 1px solid #F0EDE6;
      transition: transform 0.2s, box-shadow 0.2s;
    }
    .launch-card:hover {
      transform: translateY(-4px);
      box-shadow: 0 12px 40px rgba(0,0,0,0.08);
    }
    .confetti-badge {
      background: linear-gradient(135deg, #FEF3C7, #FDE68A);
      border: 1px solid #FCD34D;
    }
    .nav-link { transition: color 0.15s; }
    .nav-link:hover { color: #111; }
    .empty-state {
      background: white;
      border-radius: 24px;
      border: 1px dashed #E5E3DC;
    }
  </style>
</head>
<body class="min-h-screen">

  <!-- Nav -->
  <nav class="bg-white border-b border-gray-100 sticky top-0 z-50">
    <div class="max-w-6xl mx-auto px-6 py-4 flex items-center justify-between">
      <div class="flex items-center gap-3">
        <div class="w-8 h-8 rounded-xl bg-gray-900 flex items-center justify-center">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
            <polygon points="13 2 3 14 12 14 11 22 21 10 12 10 13 2"/>
          </svg>
        </div>
        <span class="serif text-lg text-gray-900">Start The Up</span>
      </div>
      <div class="flex items-center gap-6">
        <a href="dashboard.html" class="nav-link text-sm text-gray-500">Dashboard</a>
        <a href="checkin.html" class="nav-link text-sm text-gray-500">Check-in</a>
        <a href="launch-wall.html" class="nav-link text-sm font-medium text-gray-900">Launch Wall</a>
        <button onclick="logout()" class="text-sm text-gray-400 hover:text-gray-700 transition-colors">Sign out</button>
      </div>
    </div>
  </nav>

  <main class="max-w-6xl mx-auto px-6 py-10 fade-in">

    <!-- Header -->
    <div class="text-center mb-12">
      <span class="inline-block text-3xl mb-3">🚀</span>
      <h1 class="serif text-5xl text-gray-900 mb-3">Launch Wall</h1>
      <p class="text-gray-500 max-w-md mx-auto">Builders who shipped their Chrome extension to 100%. These folks finished what they started.</p>
    </div>

    <!-- Count badge -->
    <div class="flex justify-center mb-10">
      <div class="confetti-badge inline-flex items-center gap-2 px-4 py-2 rounded-full">
        <span class="text-sm font-medium text-yellow-800">
          <span id="launchCount">…</span> extensions launched this cohort
        </span>
      </div>
    </div>

    <!-- Cards grid -->
    <div id="launchGrid" class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 gap-5">
      <!-- populated by JS -->
    </div>

    <!-- Empty state -->
    <div id="emptyState" class="hidden empty-state p-16 text-center">
      <div class="text-4xl mb-4">🏗️</div>
      <h3 class="serif text-2xl text-gray-700 mb-2">No launches yet</h3>
      <p class="text-gray-400 text-sm mb-6">The first builder to hit 100% will appear here. Could be you.</p>
      <a href="checkin.html" class="inline-flex items-center gap-2 bg-gray-900 text-white px-6 py-3 rounded-xl text-sm font-medium hover:bg-gray-700 transition-colors">
        Submit a check-in →
      </a>
    </div>

  </main>
  <script src="static/config.js"></script>
  <script src="static/script.js"></script>
  <script>
    requireAuth();

    async function loadLaunchWall() {
      const entries = await apiFetch('/launch-wall');
      document.getElementById('launchCount').textContent = entries.length;

      if (!entries.length) {
        document.getElementById('launchGrid').classList.add('hidden');
        document.getElementById('emptyState').classList.remove('hidden');
        return;
      }

      document.getElementById('launchGrid').innerHTML = entries.map((e, i) => {
        const date = e.launched_at
          ? new Date(e.launched_at).toLocaleDateString('en-GB', { day:'numeric', month:'long', year:'numeric' })
          : '';

        const initials = e.name.split(' ').map(n => n[0]).join('').slice(0, 2).toUpperCase();
        const colors = ['#FEF3C7', '#D1FAE5', '#DBEAFE', '#F3E8FF', '#FCE7F3', '#FFF7ED'];
        const textColors = ['#92400E', '#065F46', '#1E40AF', '#6B21A8', '#9D174D', '#7C2D12'];
        const ci = i % colors.length;

        return `
          <div class="launch-card p-6">
            <div class="flex items-start justify-between mb-5">
              <div class="w-12 h-12 rounded-2xl flex items-center justify-center font-semibold text-sm"
                   style="background:${colors[ci]};color:${textColors[ci]}">
                ${initials}
              </div>
              <span class="text-xs bg-green-50 text-green-700 border border-green-100 rounded-full px-2.5 py-1 font-medium">
                100% ✓
              </span>
            </div>
            <h3 class="font-semibold text-gray-900 mb-1">${e.project_name}</h3>
            <p class="text-sm text-gray-500 mb-4">by ${e.name}</p>
            ${date ? `<p class="text-xs text-gray-400 mb-4">Launched ${date}</p>` : ''}
            ${e.demo_link
              ? `<a href="${e.demo_link}" target="_blank"
                    class="inline-flex items-center gap-1.5 text-xs font-medium text-gray-700 bg-gray-50 hover:bg-gray-100 border border-gray-200 rounded-lg px-3 py-2 transition-colors">
                  <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M18 13v6a2 2 0 01-2 2H5a2 2 0 01-2-2V8a2 2 0 012-2h6"/><polyline points="15 3 21 3 21 9"/><line x1="10" y1="14" x2="21" y2="3"/></svg>
                  View Extension
                </a>`
              : `<span class="text-xs text-gray-400">No link yet</span>`
            }
          </div>
        `;
      }).join('');
    }

    loadLaunchWall();
  </script>
</body>
</html>
