<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Login — Start The Up</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Instrument+Serif:ital@0;1&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet" />
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    :root {
      --cream: #FAF9F6;
      --ink: #1A1A1A;
      --muted: #6B7280;
      --accent: #2563EB;
      --border: #E5E3DC;
    }
    body { font-family: 'DM Sans', sans-serif; background: var(--cream); }
    .serif { font-family: 'Instrument Serif', serif; }
    .bg-grid {
      background-image: radial-gradient(circle, #d1d5db 1px, transparent 1px);
      background-size: 28px 28px;
    }
    input:focus { outline: none; border-color: var(--accent) !important; box-shadow: 0 0 0 3px rgba(37,99,235,0.08); }
    .btn-primary {
      background: var(--ink);
      transition: background 0.2s, transform 0.1s;
    }
    .btn-primary:hover { background: #2d2d2d; transform: translateY(-1px); }
    .btn-primary:active { transform: translateY(0); }
    .error-shake { animation: shake 0.3s; }
    @keyframes shake {
      0%,100% { transform: translateX(0); }
      25% { transform: translateX(-6px); }
      75% { transform: translateX(6px); }
    }
    .fade-in { animation: fadeIn 0.5s ease; }
    @keyframes fadeIn { from { opacity:0; transform:translateY(12px); } to { opacity:1; transform:translateY(0); } }
  </style>
</head>
<body class="min-h-screen bg-grid flex items-center justify-center px-4">

  <div class="fade-in w-full max-w-md">

    <!-- Logo mark -->
    <div class="text-center mb-8">
      <div class="inline-flex items-center justify-center w-12 h-12 rounded-2xl bg-gray-900 mb-4">
        <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <polygon points="13 2 3 14 12 14 11 22 21 10 12 10 13 2"/>
        </svg>
      </div>
      <h1 class="serif text-3xl text-gray-900">Start The Up</h1>
      <p class="text-sm text-gray-500 mt-1">Builder Tracker — Cohort Dashboard</p>
    </div>

    <!-- Card -->
    <div id="loginCard" class="bg-white rounded-3xl shadow-sm border border-gray-100 p-8">
      <h2 class="text-xl font-semibold text-gray-900 mb-1">Welcome back</h2>
      <p class="text-sm text-gray-500 mb-7">Sign in to track your build progress</p>

      <div id="errorMsg" class="hidden mb-5 text-sm text-red-600 bg-red-50 border border-red-100 rounded-xl px-4 py-3"></div>

      <div class="space-y-4">
        <div>
          <label class="block text-xs font-medium text-gray-600 mb-1.5 uppercase tracking-wider">Email</label>
          <input
            id="email"
            type="email"
            placeholder="you@example.com"
            class="w-full px-4 py-3 rounded-xl border border-gray-200 bg-gray-50 text-gray-900 text-sm transition-all"
          />
        </div>
        <div>
          <label class="block text-xs font-medium text-gray-600 mb-1.5 uppercase tracking-wider">Password</label>
          <input
            id="password"
            type="password"
            placeholder="••••••••"
            class="w-full px-4 py-3 rounded-xl border border-gray-200 bg-gray-50 text-gray-900 text-sm transition-all"
          />
        </div>
      </div>

      <button
        id="loginBtn"
        onclick="handleLogin()"
        class="btn-primary mt-6 w-full py-3.5 rounded-xl text-white font-medium text-sm"
      >
        Sign in →
      </button>
    </div>

    <p class="text-center text-xs text-gray-400 mt-6">
      Access is invite-only · <a href="https://wa.me/your-group-link" class="underline">Join community</a>
    </p>
  </div>

  <script src="static/script.js"></script>
  <script>
    // Redirect if already logged in
    if (localStorage.getItem('token')) window.location.href = 'dashboard.html';

    document.getElementById('password').addEventListener('keydown', e => {
      if (e.key === 'Enter') handleLogin();
    });

    async function handleLogin() {
      const email = document.getElementById('email').value.trim();
      const password = document.getElementById('password').value;
      const btn = document.getElementById('loginBtn');
      const errEl = document.getElementById('errorMsg');
      const card = document.getElementById('loginCard');

      if (!email || !password) {
        showError('Please fill in both fields.');
        return;
      }

      btn.textContent = 'Signing in…';
      btn.disabled = true;
      errEl.classList.add('hidden');

      try {
        const res = await fetch(`${API_BASE}/login`, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ email, password }),
        });
        const data = await res.json();
        if (!res.ok) throw new Error(data.detail || 'Login failed');

        localStorage.setItem('token', data.access_token);
        btn.textContent = 'Redirecting…';
        window.location.href = 'dashboard.html';
      } catch (err) {
        showError(err.message);
        card.classList.add('error-shake');
        setTimeout(() => card.classList.remove('error-shake'), 400);
        btn.textContent = 'Sign in →';
        btn.disabled = false;
      }
    }

    function showError(msg) {
      const el = document.getElementById('errorMsg');
      el.textContent = msg;
      el.classList.remove('hidden');
    }
  </script>
</body>
</html>
